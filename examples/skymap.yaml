# Example uranometria config — regenerate the sample with:
#   uv run uranometria chart examples/skymap.yaml
#
# Objects can be:
#   - a bare designation:      - M31
#   - a lookup with overrides: - {id: Sh2-142, label: NGC 7380}
#   - a fully manual entry:    - {label: X, name: Y, type: Z, constellation: W,
#                                 ra: "20h15m22s", dec: "+38 21 18"}
# Optional per-object fields:
#   image: path or http(s) URL — click the marker/legend entry to view it.
#          Paths resolve relative to the output HTML and are checked at build.
#   color: any CSS color for that object's marker + legend accent.
# Designations resolved offline: Messier, NGC, IC, Sharpless (Sh2-),
# Caldwell (C), Barnard (B), Melotte (Mel), and common names like "Pleiades".
# Anything else falls back to the CDS Sesame online resolver (disable with
# --offline). A southern-hemisphere chart is added automatically when any
# object sits below declination −35°.

title: The Northern Sky
subtitle: Seven deep-sky objects · Seestar S50 · Epoch J2000
# Chart-level options (defaults shown):
# mag_limit: 5.0        # faintest stars drawn
# show_ecliptic: true
# mirror: false         # true for the mirrored (celestial-globe) orientation
# Per-object colors below reuse the annotation palette (webui.py), so the
# chart legend and annotated-image legends share one color language:
# galaxies #82B4F5, emission nebulae #F48FB1, planetaries #80DEEA,
# clusters #FFCC80, everything else #C5CAE9.
objects:
  - id: M31
    image: images/M31.jpg
    color: "#82B4F5"     # galaxy
  - id: M45
    image: images/M45.jpg
    color: "#FFCC80"     # open cluster
  - id: M1
    image: images/M1.jpg
    color: "#C5CAE9"     # supernova remnant (the catch-all hue)
  - id: M42
    image: images/M42.jpg
    color: "#F48FB1"     # emission nebula: Cl+N in OpenNGC, but it reads
                         # as the nebula, so it gets the nebula color
  - id: M51
    image: images/M51.jpg
    color: "#82B4F5"     # galaxy
    annotations: annotated/m51.annotations.json  # annotation model from
                                              # `uranometria annotate`; powers the
                                              # in-lightbox overlay and object list
    annotated: annotated/M51_annotated.html   # standalone page; the legend
                                              # links here only for objects
                                              # without an embedded model, so
                                              # the annotations above win
  - id: M27
    image: images/M27.jpg
    color: "#80DEEA"     # planetary nebula
  - id: Sh2-142
    label: NGC 7380
    name: Wizard Nebula · Sh2-142
    type: Emission nebula + cluster
    constellation: Cepheus
    color: "#F48FB1"     # emission nebula
    image: images/Sh2-142.jpg
